syntax = "proto3";

package note;

option go_package = "backend/notes_service/pkg/note/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service NoteService {
  rpc GetAllNotes(GetAllNotesRequest) returns (GetAllNotesResponse);
  rpc CreateNote(CreateNoteRequest) returns (Note);
  rpc GetNoteById(GetNoteByIdRequest) returns (Note);
  rpc GetNoteByShareUUID(GetNoteByShareUUIDRequest) returns (Note);
  rpc UpdateNote(UpdateNoteRequest) returns (Note);
  rpc DeleteNote(DeleteNoteRequest) returns (google.protobuf.Empty);
  rpc AddFavorite(FavoriteRequest) returns (google.protobuf.Empty);
  rpc RemoveFavorite(FavoriteRequest) returns (google.protobuf.Empty);
  rpc SearchNotes(SearchNotesRequest) returns (SearchNotesResponse);
  rpc SetIcon(SetIconRequest) returns (Note);
  rpc SetHeader(SetHeaderRequest) returns (Note);
}

message Note {
  uint64 id = 1;
  uint64 owner_id = 2;
  optional uint64 parent_note_id = 3;
  string title = 4;
  optional uint64 icon_file_id = 5;
  bool is_favorite = 6;
  bool is_archived = 7;
  bool is_shared = 8;
  optional string share_uuid = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  optional google.protobuf.Timestamp deleted_at = 12;
  optional uint64 header_file_id = 13;
}

message GetAllNotesRequest {
  uint64 user_id = 1;
}

message GetAllNotesResponse {
  repeated Note notes = 1;
}

message CreateNoteRequest {
  uint64 user_id = 1;
  optional uint64 parent_note_id = 2;
}

message GetNoteByIdRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
}

message GetNoteByShareUUIDRequest {
  string share_uuid = 1;
}

message UpdateNoteRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
  optional string title = 3;
  optional bool is_archived = 4;
}

message DeleteNoteRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
}

message FavoriteRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
}

message SearchNotesRequest {
  uint64 user_id = 1;
  string query = 2;
}

message SearchResult {
  uint64 note_id = 1;
  string title = 2;
  string highlighted_title = 3;
  string content_snippet = 4;
  float rank = 5;
  google.protobuf.Timestamp updated_at = 6;
  optional uint64 icon_file_id = 7;
}

message SearchNotesResponse {
  repeated SearchResult results = 1;
  int32 count = 2;
}

message SetIconRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
  uint64 icon_file_id = 3;
}

message SetHeaderRequest {
  uint64 user_id = 1;
  uint64 note_id = 2;
  uint64 header_file_id = 3;
}