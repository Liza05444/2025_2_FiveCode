name: Backend CI/CD

on:
  push:
    branches: ["main", "master", "RK4"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Install tools
        run: |
          go install github.com/golang/mock/mockgen@v1.6.0
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install github.com/mailru/easyjson/easyjson@latest

      - run: go mod download
      
      - name: Generate Mocks
        run: make mock
      
      - name: Generate EasyJSON
        run: make easyjson

      - name: Run Linter
        run: make lint

      - name: Run Tests
        run: make test-coverage

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, gateway, notes, user, minio-init]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/goose-${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/docker-compose.prod.yaml"
          target: "/home/${{ secrets.SSH_USER }}/deploy/"
          strip_components: 1

      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/deploy
            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans
            docker image prune -f
