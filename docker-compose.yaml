services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT_EXTERNAL}:9000"
      - "${MINIO_CONSOLE_PORT_EXTERNAL}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:14
    container_name: goose_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goose_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: goose_auth
    env_file: .env
    environment:
      CONFIG_PATH: "./config"
      REDIS_HOST: "redis"
      SERVICES_USER_GRPC_HOST: "user"
      SERVICES_USER_GRPC_PORT: "50052"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      user:
        condition: service_started

  user:
    build:
      context: .
      dockerfile: Dockerfile.user
    container_name: goose_user
    env_file: .env
    environment:
      CONFIG_PATH: "./config"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "user_db"
      DB_SSLMODE: "${DB_SSLMODE}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  notes:
    build:
      context: .
      dockerfile: Dockerfile.notes
    container_name: goose_notes
    env_file: .env
    environment:
      CONFIG_PATH: "./config"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "notes_db"
      DB_SSLMODE: "${DB_SSLMODE}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: goose_gateway
    env_file: .env
    environment:
      CONFIG_PATH: "./config"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "files_db"
      DB_SSLMODE: "${DB_SSLMODE}"
      
      MINIO_ENDPOINT: "minio:9000"
      
      SERVICES_AUTH_GRPC_HOST: "auth"
      SERVICES_AUTH_GRPC_PORT: "50051"
      SERVICES_USER_GRPC_HOST: "user"
      SERVICES_USER_GRPC_PORT: "50052"
      SERVICES_NOTES_GRPC_HOST: "notes"
      SERVICES_NOTES_GRPC_PORT: "50053"
    ports:
      - "${SERVER_PORT_EXTERNAL}:8080"
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      user:
        condition: service_started
      notes:
        condition: service_started

volumes:
  minio_data:
  postgres_data:
  redis_data:
