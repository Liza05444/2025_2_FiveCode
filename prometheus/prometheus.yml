global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: 'gateway'

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth:9090']
        labels:
          service: 'auth'

  - job_name: 'user-service'
    static_configs:
      - targets: ['user:9092']
        labels:
          service: 'user'

  - job_name: 'notes-service'
    static_configs:
      - targets: ['notes:9091']
        labels:
          service: 'notes'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          service: 'node'
